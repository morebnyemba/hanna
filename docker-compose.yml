services:
  db:
    image: postgres:15-alpine
    container_name: whatsappcrm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: whatsappcrm_redis
    command: >
      sh -c "redis-server /usr/local/etc/redis/redis.conf --requirepass $${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: ./whatsappcrm_backend
    container_name: whatsappcrm_backend_app
    volumes:
      - ./whatsappcrm_backend:/app
      - staticfiles_volume:/app/staticfiles # Mount the static files volume (used by collectstatic)
      - mediafiles_volume:/app/mediafiles # Mount the media files volume (user uploads)
    command: >
      sh -c "# python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 whatsappcrm_backend.asgi:application"
    env_file:
      - ./whatsappcrm_backend/.env.prod
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build: ./whatsapp-crm-frontend
    container_name: whatsappcrm_frontend_app
    volumes:
      - mediafiles_volume:/usr/share/nginx/html/media:ro  # Mount media files for serving (read-only)
    depends_on:
      - backend
    restart: unless-stopped

  hanna-management-frontend:
    build: ./hanna-management-frontend
    container_name: hanna_management_frontend_nextjs
    command: npm start
    # Note: Camera/barcode scanning features use browser WebRTC APIs (navigator.mediaDevices)
    # and do not require server-side device access
    depends_on:
      - backend
    restart: unless-stopped

  # ── Celery workers (optimised for 2 vCPU / 8 GB RAM) ──────────────────────
  #
  # Strategy:
  #   • All messaging / flow tasks are I/O-bound (HTTP calls to Meta API,
  #     DB reads). gevent greenlets cost ~KB each vs ~200 MB per prefork
  #     process, so we get high concurrency at a fraction of the RAM.
  #   • CPU-heavy work (media sync, AI attachment processing) keeps prefork
  #     but is capped at 1 so it never fights the other vCPU.
  #   • prefetch_multiplier=1 keeps Redis fair when a single worker handles
  #     multiple queues — no worker hoards tasks from the others.
  #
  #  Before → After
  #  8 workers, 123 prefork processes → 3 workers, ~32 greenlets + 1 process

  # Worker 1 — messaging + default I/O  (gevent, 20 greenlets)
  # Handles: whatsapp sends, read receipts, msg_sending, beat-scheduled tasks
  celery_messaging_worker:
    build: ./whatsappcrm_backend
    container_name: whatsappcrm_celery_messaging
    command: >
      celery -A whatsappcrm_backend worker
      -Q whatsapp,msg_sending,celery
      -l INFO
      -P gevent
      --concurrency=20
      --prefetch-multiplier=1
    # Under the gevent pool, gevent monkey-patching + async_to_sync (Channels)
    # makes Django's async-safety guard fire a false SynchronousOnlyOperation on
    # ORM calls. There is no real async web context in a Celery worker, so it is
    # safe to disable the guard here. Without this, ORM access in tasks (and the
    # result backend) fails and messages are never sent.
    environment:
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
    volumes:
      - ./whatsappcrm_backend:/app
      - mediafiles_volume:/app/mediafiles
    env_file:
      - ./whatsappcrm_backend/.env.prod
    depends_on:
      - redis
      - db
    restart: unless-stopped

  # Worker 2 — flow processing + AI conversations  (gevent, 10 greenlets)
  # Handles: flow engine, AI chat, AI shopping, idle-session cleanup
  celery_flow_worker:
    build: ./whatsappcrm_backend
    container_name: whatsappcrm_celery_flow
    command: >
      celery -A whatsappcrm_backend worker
      -Q flow_processing
      -l INFO
      -P gevent
      --concurrency=10
      --prefetch-multiplier=1
    # See celery_messaging_worker: gevent pool needs the async guard disabled.
    environment:
      DJANGO_ALLOW_ASYNC_UNSAFE: "true"
    volumes:
      - ./whatsappcrm_backend:/app
      - mediafiles_volume:/app/mediafiles
    env_file:
      - ./whatsappcrm_backend/.env.prod
    depends_on:
      - redis
      - db
    restart: unless-stopped

  # Worker 3 — CPU-bound tasks  (prefork, 1 process)
  # Handles: media sync, Gemini attachment processing
  celery_cpu_worker:
    build: ./whatsappcrm_backend
    container_name: whatsappcrm_celery_cpu
    command: >
      celery -A whatsappcrm_backend worker
      -Q cpu_heavy
      -l INFO
      --concurrency=2
    volumes:
      - ./whatsappcrm_backend:/app
      - staticfiles_volume:/app/staticfiles
      - mediafiles_volume:/app/mediafiles
    env_file:
      - ./whatsappcrm_backend/.env.prod
    depends_on:
      - redis
      - db
    restart: unless-stopped

  celery_beat:
    build: ./whatsappcrm_backend
    container_name: whatsappcrm_celery_beat
    command: celery -A whatsappcrm_backend beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./whatsappcrm_backend:/app
      - mediafiles_volume:/app/mediafiles # Mount the media files volume (user uploads)
    env_file:
      - ./whatsappcrm_backend/.env.prod
    depends_on:
      - redis
      - db
    restart: unless-stopped

  email_idle_fetcher:
    build: ./whatsappcrm_backend
    container_name: whatsappcrm_email_idle_fetcher
    command: python manage.py idle_email_fetcher
    volumes:
      - ./whatsappcrm_backend:/app
      - mediafiles_volume:/app/mediafiles # Mount the media files volume (user uploads)
    env_file:
      - ./whatsappcrm_backend/.env.prod
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: whatsappcrm_nginx
    ports:
      - '80:80'   # Public HTTP Port
      - '443:443' # Public HTTPS Port
    volumes:
      - ./nginx_proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - mediafiles_volume:/srv/www/media:ro  # Mount media files (read-only, Django serves them)
      - /etc/letsencrypt:/etc/letsencrypt:ro  # SSL certificates from host (read-only)
      - ./nginx_proxy/ssl_custom:/etc/nginx/ssl_custom:ro  # Custom SSL configs
      - letsencrypt_webroot:/var/www/letsencrypt  # ACME challenge directory for Let's Encrypt (read-write needed)
    depends_on:
      - backend
      - frontend
      - hanna-management-frontend
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: whatsappcrm_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt  # SSL certificates from host
      - letsencrypt_webroot:/var/www/letsencrypt
      - ./certbot-renew.sh:/usr/local/bin/certbot-renew.sh:ro
    entrypoint: /bin/sh /usr/local/bin/certbot-renew.sh
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  staticfiles_volume:
  mediafiles_volume:  # Shared volume for user-uploaded media files
  npm_data:
  npm_letsencrypt:
  letsencrypt_webroot:  # Directory for Let's Encrypt ACME challenge files

networks:
  default:
    name: hanna_network
    driver: bridge
