<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Offline | Hanna</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #faf5ff);
      color: #1f2937;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      background: #fff;
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 20px 45px rgba(79, 70, 229, 0.15);
    }
    .badge {
      width: 72px; height: 72px;
      margin: 0 auto 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      color: #fcd34d; font-size: 34px; font-weight: 700;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #6b7280; line-height: 1.5; margin: 0 0 24px; }
    button {
      border: 0; cursor: pointer;
      background: #4f46e5; color: #fff;
      font-size: 15px; font-weight: 600;
      padding: 12px 22px; border-radius: 10px;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">H</div>
    <h1>You're offline</h1>
    <p>We can't reach the Hanna servers right now. Check your connection and try again — any pages you've already visited remain available.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
